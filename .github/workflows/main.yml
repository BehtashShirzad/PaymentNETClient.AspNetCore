name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack PaymentNET.AspNetCore
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          dotnet pack PaymentNET.AspNetCore.csproj \
            -c Release \
            --no-build \
            -p:PackageVersion=$VERSION \
            -o ./artifacts
          echo "Checking artifacts:"
          ls -la ./artifacts


      - name: Publish to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.PAYMENTNETCLIENTS_SECRETKEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
